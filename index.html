<body>

<script>
  (function(){
    "use strict";
    let audioCtx = null;
    function initAudioCtx() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext()); } catch(e) {} }
    function playClickSound() {
      if (!audioCtx) { initAudioCtx(); if (!audioCtx) return; }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.08);
    }

    const PERSONALITIES = [
      { name:"卷王", en:"MUSE", desc:"逛博物馆永远最认真，别人随便打卡走马观花，自己会仔细看展、研究文物历史。", image:"MUSE.png" },
      { name:"出片者", en:"OOTD", desc:"出门旅行很注重穿搭造型，审美在线超会搭配。走到哪拍到哪，超会找角度抓氛围。", image:"OOTD.png" },
      { name:"美食家", en:"FOOD-ie", desc:"实打实的吃货选手，旅行第一目标就是吃遍当地特色。热衷于挖掘街边小店。", image:"FOOD-ie.png" },
      { name:"领导者", en:"LEAD-er", desc:"团队里的主心骨，负责规划路线、安排行程、协调所有人。遇事冷静靠谱。", image:"LEAD-er.png" },
      { name:"特种兵", en:"SPEC", desc:"体力超强的暴走选手，节奏快、耐力足。一天能打卡超多地方。", image:"SPEC.png" },
      { name:"哈密瓜羚羊", en:"CLIM-ber", desc:"90°是墙，89°就是坡。看到坡就想往上爬，陡坡峭壁都拦不住一颗攀爬的心。", image:"CLIM-ber.png" },
      { name:"摄影师", en:"PICS", desc:"随身自带拍照buff，手机相机不离手。擅长记录沿途风景、人文瞬间。", image:"PICS.png" },
      { name:"路边社牛", en:"SOCI", desc:"天生外向自来熟，在路边、市集、古城里都能随意和陌生人搭话唠嗑。", image:"SOCI.png" },
      { name:"丁丁酒鬼", en:"DRUN", desc:"白天认真赶路游玩，晚上喜欢小酌放松。偏爱微醺氛围。", image:"DRUN.png" },
      { name:"哆啦A梦", en:"DORA", desc:"行走的万能百宝袋，背包里塞满各种实用小物件。贴心又万能。", image:"DORA.png" },
      { name:"盖章收集控", en:"STAM", desc:"重度集章爱好者，走到一座城就必找各处印章，用专属仪式感收藏旅途回忆。", image:"STAM.png" },
      { name:"买买提人格", en:"BUY-er", desc:"超爱逛市集和小店，看到特色文创、手作、特产就忍不住入手。", image:"BUY-er.png" },
      { name:"毛茸茸的人", en:"WOLF", desc:"白天温柔软糯，夜晚逻辑与演技悄然上线，反差最大的可爱狼队友。", image:"WOLF.png" },
      { name:"路痴者", en:"LOST", desc:"天生方向感为零，分不清东南西北，乖乖跟着大部队走。", image:"LOST.png" },
      { name:"我都OK", en:"OKAY", desc:"脾气超好超好说话，随和又百搭，没有特殊要求。", image:"OKAY.png" },
      { name:"吟游诗人", en:"POET", desc:"自带浪漫文艺气质，心思细腻敏感，把旅途的风景都赋予温柔诗意。", image:"POET.png" }
    ];

    const KEY_MAP = { "MUSE":0, "OOTD":1, "FOOD-ie":2, "LEAD-er":3, "SPEC":4, "CLIM-ber":5, "PICS":6, "SOCI":7, "DRUN":8, "DORA":9, "STAM":10, "BUY-er":11, "WOLF":12, "LOST":13, "OKAY":14, "POET":15 };

    const QUESTIONS = [
      { text: "到达博物馆/文物遗址，你会？", options: [
          { text: "仔细研读每一件展品，记录细节、了解背后历史", trait: "MUSE" },
          { text: "重点拍照记录，捕捉展品与遗址的细节美感", trait: "PICS" },
          { text: "遇到坡就想爬上去看看高处风景", trait: "CLIM-ber" },
          { text: "快速浏览重点文物，高效打卡", trait: "SPEC" }
      ]},
      { text: "团队规划考察路线时，你会？", options: [
          { text: "主动牵头，查攻略、定路线、统筹全局", trait: "LEAD-er" },
          { text: "随和听从，大家定什么路线我都OK", trait: "OKAY" },
          { text: "分不清方向，不认路，全程跟队友走就行", trait: "LOST" },
          { text: "主动询问当地人推荐的小众路线", trait: "SOCI" }
      ]},
      { text: "考察途中遇到好看的风景，你会？", options: [
          { text: "整理穿搭，拍氛围感照片", trait: "OOTD" },
          { text: "停下脚步静静感受，心生感慨", trait: "POET" },
          { text: "快速打卡，不耽误行程", trait: "SPEC" },
          { text: "记录地貌与光影，作为田野素材", trait: "PICS" }
      ]},
      { text: "路过当地市集，你的第一反应是？", options: [
          { text: "直奔小吃摊，烤包子手抓饭", trait: "FOOD-ie" },
          { text: "逛遍摊位，挑选文创手作和实用小物件", trait: "BUY-er" },
          { text: "在酒馆与本地人搭讪，打听民俗并微醺一下", trait: "DRUN" },
          { text: "走马观花，随便逛逛没有明确目的", trait: "OKAY" }
      ]},
      { text: "你的背包里，一定会常备什么？", options: [
          { text: "应急小物件、补给品", trait: "DORA" },
          { text: "集章本和笔", trait: "STAM" },
          { text: "小酒/饮品", trait: "DRUN" },
          { text: "相机/备用镜头", trait: "PICS" }
      ]},
      { text: "考察当天行程很紧凑，你会？", options: [
          { text: "紧跟节奏，体力拉满", trait: "SPEC" },
          { text: "即使时间紧，也忍不住绕路去攀爬附近的高坡", trait: "CLIM-ber" },
          { text: "无所谓，跟着队伍走", trait: "OKAY" },
          { text: "主动协调节奏，确保精华", trait: "LEAD-er" }
      ]},
      { text: "团队中有人迷路/遇到小麻烦，你会？", options: [
          { text: "冷静牵头解决问题", trait: "LEAD-er" },
          { text: "拿出应急物品帮忙", trait: "DORA" },
          { text: "温柔安抚，默默陪伴", trait: "WOLF" },
          { text: "什么都不做，默默观察", trait: "OKAY" }
      ]},
      { text: "晚上在住宿地/绿皮火车上，你喜欢？", options: [
          { text: "小酌一杯，微醺聊天", trait: "DRUN" },
          { text: "组织狼人杀", trait: "WOLF" },
          { text: "安安静静休息，回味白天爬坡的快乐", trait: "CLIM-ber" },
          { text: "整理笔记资料", trait: "MUSE" }
      ]},
      { text: "考察时需要记录素材，你会？", options: [
          { text: "用相机抓拍", trait: "PICS" },
          { text: "认真记录文字", trait: "MUSE" },
          { text: "写随笔、感慨", trait: "POET" },
          { text: "在集章本盖章", trait: "STAM" }
      ]},
      { text: "遇到不熟悉的本地习俗，你会？", options: [
          { text: "主动请教本地人", trait: "SOCI" },
          { text: "买一些当地特色的纪念品，间接感受习俗", trait: "BUY-er" },
          { text: "不主动了解，尊重即可", trait: "OKAY" },
          { text: "查阅资料或问向导", trait: "MUSE" }
      ]},
      { text: "团队意见不一致时，你会？", options: [
          { text: "协调各方，拿出方案", trait: "LEAD-er" },
          { text: "不站队，怎么都行", trait: "OKAY" },
          { text: "倾听调和，不争执", trait: "WOLF" },
          { text: "提议先爬个坡冷静一下", trait: "CLIM-ber" }
      ]},
      { text: "考察间隙休息，你会？", options: [
          { text: "找个小坡登高望远，放松身心", trait: "CLIM-ber" },
          { text: "整理穿搭补妆", trait: "OOTD" },
          { text: "整理集章本", trait: "STAM" },
          { text: "分享零食复盘狼人杀", trait: "WOLF" }
      ]},
      { text: "对于“打卡式”环节，你态度是？", options: [
          { text: "快速完成，专注核心", trait: "SPEC" },
          { text: "认真打卡，仪式感", trait: "OOTD" },
          { text: "不刻意打卡，感受当下", trait: "POET" },
          { text: "集章打卡必须的", trait: "STAM" }
      ]},
      { text: "带队友去考察点，你会？", options: [
          { text: "提前查攻略全程带队", trait: "LEAD-er" },
          { text: "让别人带路，跟着走", trait: "LOST" },
          { text: "问本地人唠嗑解锁路线", trait: "SOCI" },
          { text: "导航最短路径高效抵达", trait: "SPEC" }
      ]},
      { text: "考察结束后，最想保留什么纪念？", options: [
          { text: "集满章的纪念册", trait: "STAM" },
          { text: "整理好的照片合集", trait: "PICS" },
          { text: "买的特产和文创", trait: "BUY-er" },
          { text: "不留实体纪念物，默默记在心中", trait: "POET" }
      ]},
      { text: "田野考察的核心意义是？", options: [
          { text: "深入了解历史与人文，收获知识", trait: "MUSE" },
          { text: "感受山河浪漫，体验风土人情", trait: "POET" },
          { text: "高效完成考察任务，不留遗憾", trait: "SPEC" },
          { text: "用影像和记录保存文化自然", trait: "PICS" }
      ]}
    ];

    const welcome = document.getElementById('welcomeSection');
    const quizSection = document.getElementById('quizSection');
    const resultSection = document.getElementById('resultSection');
    const photoSection = document.getElementById('photoSection');
    const questionDisplay = document.getElementById('questionDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetToWelcomeBtn = document.getElementById('resetToWelcomeBtn');
    const restartFromResult = document.getElementById('restartFromResult');
    const backToHomeFromResult = document.getElementById('backToHomeFromResult');
    const startBtn = document.getElementById('startTestBtn');
    const photoWallEntryBtn = document.getElementById('photoWallEntryBtn');
    const closePhotoBtn = document.getElementById('closePhotoBtn');
    const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
    const photoFile = document.getElementById('photoFile');
    const photoComment = document.getElementById('photoComment');
    const photoGrid = document.getElementById('photoGrid');
    const progressLabel = document.getElementById('progressLabel');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const personaGrid = document.getElementById('personaGrid');
    const toggleGalleryBtn = document.getElementById('toggleGalleryBtn');
    const wenTingTag = document.getElementById('wenTingTag');
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const statsHighlight = document.getElementById('statsHighlight');
    const statsBars = document.getElementById('statsBars');
    const viewPortraitBtn = document.getElementById('viewPortraitBtn');
    const personaModal = document.getElementById('personaModal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const modalImage = document.getElementById('modalImage');
    const modalName = document.getElementById('modalName');
    const modalEn = document.getElementById('modalEn');
    const modalDesc = document.getElementById('modalDesc');
    let musicPlaying = false;
    let currentIndex = 0;
    let answers = new Array(16).fill(-1);
    let scores = new Array(16).fill(0);
    let galleryVisible = false;
    let autoNextLock = false;
    let currentResultIndex = 0;

    const STATS_KEY = 'xinjiang_personality_stats';
    function loadStats() { try { const d = JSON.parse(localStorage.getItem(STATS_KEY)); return d && Array.isArray(d) && d.length===16 ? d : new Array(16).fill(0); } catch(e) { return new Array(16).fill(0); } }
    function saveStats(stats) { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
    function recordResult(personalityIndex) { const stats = loadStats(); stats[personalityIndex] = (stats[personalityIndex] || 0) + 1; saveStats(stats); }
    function renderStats(currentIndex) {
      const stats = loadStats();
      const total = stats.reduce((a,b)=>a+b, 0);
      const sameCount = stats[currentIndex] || 0;
      const currentPersona = PERSONALITIES[currentIndex];
      statsHighlight.innerHTML = total === 0 ? '🌱 你是第一位踏上这条丝路的旅人！' : `🐫 已有 <span>${total}</span> 位旅人完成测试，其中 <span>${sameCount}</span> 位和你一样是 <span>${currentPersona.name}</span>`;
      if (total === 0) { statsBars.innerHTML = ''; return; }
      const maxCount = Math.max(...stats, 1);
      let barsHtml = '';
      stats.forEach((count, idx) => {
        const pct = Math.round((count / total) * 100);
        const widthPct = Math.round((count / maxCount) * 100);
        barsHtml += `<div class="stats-row"><span class="bar-label">${PERSONALITIES[idx].name}</span><span class="bar-track"><span class="bar-fill" data-width="${widthPct}" style="width:0%;${idx===currentIndex?'background:linear-gradient(90deg,#8b3a1a,#c46a3a);':''}"></span></span><span class="bar-count">${pct}%</span></div>`;
      });
      statsBars.innerHTML = barsHtml;
      requestAnimationFrame(() => {
  const fills = statsBars.querySelectorAll('.bar-fill');
  fills.forEach(fill => {
    fill.style.width = fill.dataset.width + '%';
  });
});
    }

    const STORAGE_KEY = 'xinjiang_field_photos';
    function loadPhotos() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
    function savePhotos(photos) { localStorage.setItem(STORAGE_KEY, JSON.stringify(photos)); }
    function renderPhotoWall() {
      const photos = loadPhotos();
      photoGrid.innerHTML = '';
      photos.forEach(item => {
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.innerHTML = `<img src="${item.data}" alt="照片"><div class="photo-caption">${item.comment || ''}</div>`;
        photoGrid.appendChild(div);
      });
    }
    uploadPhotoBtn.addEventListener('click', () => {
      const file = photoFile.files[0];
      if (!file) { alert('请选择一张照片'); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        const photos = loadPhotos();
        if (photos.length >= 100) { alert('照片墙已满，最多可上传100张照片'); return; }
        photos.push({ data: e.target.result, comment: photoComment.value.trim() });
        savePhotos(photos);
        renderPhotoWall();
        photoFile.value = '';
        photoComment.value = '';
      };
      reader.readAsDataURL(file);
    });
    function openPhotoWall() {
      welcome.classList.add('hidden'); quizSection.classList.add('hidden'); resultSection.classList.add('hidden');
      photoSection.classList.remove('hidden');
      renderPhotoWall();
    }
    photoWallEntryBtn.addEventListener('click', openPhotoWall);
    closePhotoBtn.addEventListener('click', () => { photoSection.classList.add('hidden'); welcome.classList.remove('hidden'); });

    // 弹窗控制函数
    function showPersonaDetail(index) {
      const p = PERSONALITIES[index];
      modalImage.src = (p.image || '') + '?t=' + new Date().getTime();
      modalImage.alt = p.name;
      modalName.innerText = p.name;
      modalEn.innerText = p.en;
      modalDesc.innerText = p.desc;
      personaModal.classList.add('show');
      playClickSound();
    }
    function hidePersonaDetail() {
      personaModal.classList.remove('show');
      modalImage.src = '';
      playClickSound();
    }
    modalCloseBtn.addEventListener('click', hidePersonaDetail);
    personaModal.addEventListener('click', (e) => { if(e.target === personaModal) hidePersonaDetail(); });

    function renderGallery() {
      let html = '';
      PERSONALITIES.forEach((p, idx) => {
        html += `<div class="persona-card" data-index="${idx}" title="点击查看画像"><span class="zh">${p.name}</span><br><span class="en">${p.en}</span></div>`;
      });
      personaGrid.innerHTML = html;
      document.querySelectorAll('.persona-card').forEach(card => {
        card.addEventListener('click', () => {
          const index = parseInt(card.dataset.index);
          showPersonaDetail(index);
        });
      });
    }
    renderGallery();
    toggleGalleryBtn.addEventListener('click', () => {
      galleryVisible = !galleryVisible;
      if (galleryVisible) { personaGrid.classList.add('show'); toggleGalleryBtn.innerHTML = '📖 收起图鉴 ▲'; }
      else { personaGrid.classList.remove('show'); toggleGalleryBtn.innerHTML = '📖 查看人格图鉴 ▼'; }
    });

    function playMusic() { bgMusic.play().then(() => { musicPlaying = true; musicToggle.innerHTML = '🔊'; musicToggle.classList.add('playing'); }).catch(e => {}); }
    function pauseMusic() { bgMusic.pause(); musicPlaying = false; musicToggle.innerHTML = '🎵'; musicToggle.classList.remove('playing'); }
    musicToggle.addEventListener('click', () => { if (musicPlaying) pauseMusic(); else playMusic(); });
    bgMusic.addEventListener('play', () => { musicToggle.innerHTML = '🔊'; musicToggle.classList.add('playing'); musicPlaying = true; });
    bgMusic.addEventListener('pause', () => { musicToggle.innerHTML = '🎵'; musicToggle.classList.remove('playing'); musicPlaying = false; });

    function renderQuestion() {
      const q = QUESTIONS[currentIndex];
      const selected = answers[currentIndex];
      let html = `<div class="q-num">🏺 第${currentIndex+1}题 · 田野手记</div><div class="q-text">${q.text}</div><div class="options-container">`;
      q.options.forEach((opt, idx) => {
        html += `<div class="option-btn ${selected===idx?'selected':''}" data-opt="${idx}"><span class="option-prefix">${String.fromCharCode(65+idx)}</span>${opt.text}</div>`;
      });
      html += `</div>`;
      questionDisplay.innerHTML = html;
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          playClickSound();
          const idx = parseInt(btn.dataset.opt);
          answers[currentIndex] = idx;
          renderQuestion();
          updateProgress();
          if (currentIndex < 15 && !autoNextLock) {
            autoNextLock = true;
            setTimeout(() => { if (answers[currentIndex] !== -1 && currentIndex < 15) { currentIndex++; renderQuestion(); } autoNextLock = false; }, 200);
          }
        });
      });
      updateProgress();
    }
    function updateProgress() {
      const answered = answers.filter(a=>a!==-1).length;
      progressLabel.innerText = `第${currentIndex+1}/16题`;
      progressPercent.innerText = `${Math.round((answered/16)*100)}%`;
      progressFill.style.width = `${Math.round((answered/16)*100)}%`;
      prevBtn.disabled = (currentIndex === 0);
      nextBtn.innerText = (currentIndex === 15) ? (answers.every(a=>a!==-1) ? '📜 查看结果' : '✓ 完成并查看') : '下一题 ▶';
    }
    function calculateResult() {
      scores.fill(0);
      for(let i=0; i<16; i++) { if(answers[i]!==-1) scores[KEY_MAP[QUESTIONS[i].options[answers[i]].trait]]++; }
      let maxIdx = 0; scores.forEach((v,i)=>{ if(v>scores[maxIdx]) maxIdx=i; });
      currentResultIndex = maxIdx;
      const p = PERSONALITIES[maxIdx];
      document.getElementById('personaName').innerText = p.name;
      document.getElementById('personaEn').innerText = p.en;
      document.getElementById('personaDesc').innerText = p.desc;
      recordResult(maxIdx);
      renderStats(maxIdx);
      quizSection.classList.add('hidden');
      resultSection.classList.remove('hidden');
      if (wenTingTag) wenTingTag.style.display = 'inline-block';
    }
    function resetToWelcome() {
      currentIndex = 0; answers.fill(-1);
      welcome.classList.remove('hidden'); quizSection.classList.add('hidden'); resultSection.classList.add('hidden'); photoSection.classList.add('hidden');
      if (wenTingTag) wenTingTag.style.display = 'inline-block';
    }
    function startQuiz() {
      playClickSound();
      if (bgMusic && bgMusic.paused) bgMusic.play().catch(e => {});
      currentIndex = 0; answers.fill(-1);
      welcome.classList.add('hidden'); quizSection.classList.remove('hidden'); resultSection.classList.add('hidden'); photoSection.classList.add('hidden');
      if (wenTingTag) wenTingTag.style.display = 'none';
      renderQuestion();
    }
    startBtn.addEventListener('click', startQuiz);
    resetToWelcomeBtn.addEventListener('click', resetToWelcome);
    restartFromResult.addEventListener('click', () => { resetToWelcome(); startQuiz(); });
    backToHomeFromResult.addEventListener('click', resetToWelcome);
    viewPortraitBtn.addEventListener('click', () => { showPersonaDetail(currentResultIndex); });
    prevBtn.addEventListener('click', () => { if(currentIndex>0) { currentIndex--; renderQuestion(); } });
    nextBtn.addEventListener('click', () => {
      if(answers[currentIndex]===-1) { alert('✨ 选一个选项吧～'); return; }
      if(currentIndex===15) { if(!answers.every(a=>a!==-1)) { alert('还有题目没完成'); return; } calculateResult(); }
      else { currentIndex++; renderQuestion(); }
    });

    resetToWelcome();
    renderPhotoWall();
    function initAudioOnFirstInteraction() {
      const handler = () => { initAudioCtx(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); document.removeEventListener('click', handler); document.removeEventListener('touchstart', handler); };
      document.addEventListener('click', handler); document.addEventListener('touchstart', handler);
    }
    initAudioOnFirstInteraction();
  })();
</script>
</body>
</html>
